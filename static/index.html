<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incense Recipe Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
  <span class="navbar-brand mb-0 h1">Incense Recipe Manager</span>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-light btn-sm" onclick="exportData()">Export JSON</button>
    <label class="btn btn-outline-light btn-sm mb-0" style="cursor:pointer">
      Import JSON
      <input type="file" accept=".json" style="display:none" onchange="importData(this)">
    </label>
  </div>
</nav>

<ul class="nav nav-tabs px-3 pt-2 bg-light border-bottom" id="mainTabs">
  <li class="nav-item">
    <a class="nav-link active" href="#" data-tab="ingredients">Ingredients</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="#" data-tab="recipes">Recipes</a>
  </li>
</ul>

<!-- ── Ingredients tab ─────────────────────────────────────────────────────── -->
<div id="tab-ingredients" class="tab-pane p-3">
  <div class="mb-2">
    <button class="btn btn-success btn-sm" onclick="showIngredientModal()">Add Ingredient</button>
  </div>
  <table class="table table-sm table-hover align-middle">
    <thead class="table-light">
      <tr><th>Name</th><th>Category</th><th>Source URL</th><th></th></tr>
    </thead>
    <tbody id="ingredients-body"></tbody>
  </table>
</div>

<!-- ── Recipes tab ─────────────────────────────────────────────────────────── -->
<div id="tab-recipes" class="tab-pane p-3 d-none">
  <div class="mb-2 d-flex gap-2">
    <button class="btn btn-success btn-sm" onclick="openEditor(null)">New Recipe</button>
    <button class="btn btn-info btn-sm"    onclick="editSelected()">Edit</button>
    <button class="btn btn-danger btn-sm"  onclick="deleteSelected()">Delete</button>
    <button class="btn btn-primary btn-sm" onclick="showPrintDialog()">Print…</button>
  </div>
  <div class="d-flex gap-3 recipes-layout">
    <div id="recipe-list" class="recipe-list-col border-end pe-3 overflow-auto"></div>
    <div id="recipe-detail" class="flex-grow-1 overflow-auto">
      <p class="text-muted mt-4 text-center">Select a recipe to see details</p>
    </div>
  </div>
</div>

<!-- ── Ingredient modal ────────────────────────────────────────────────────── -->
<div class="modal fade" id="ingredientModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="ingredientModalTitle">Add Ingredient</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="ing-id">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" id="ing-name">
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <input type="text" class="form-control" id="ing-category" list="cat-list">
          <datalist id="cat-list"></datalist>
        </div>
        <div class="mb-3">
          <label class="form-label">Source URL</label>
          <input type="url" class="form-control" id="ing-url">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveIngredient()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Recipe editor modal ─────────────────────────────────────────────────── -->
<div class="modal fade" id="recipeModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="recipeModalTitle">New Recipe</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3 row align-items-center">
          <label class="col-sm-2 col-form-label fw-bold">Recipe Name</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" id="editor-name">
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-header fw-semibold">Category Percentages</div>
          <div class="card-body" id="editor-category-group"></div>
        </div>

        <div id="editor-ingredient-sections"></div>

        <div class="card mb-3">
          <div class="card-header fw-semibold">Notes</div>
          <div class="card-body">
            <textarea class="form-control" id="editor-notes" rows="3"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" onclick="saveRecipe()">Save Recipe</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Print dialog ────────────────────────────────────────────────────────── -->
<div class="modal fade" id="printModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Print Recipe Sheet</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="fw-semibold mb-2">Select recipes:</p>
        <div id="print-recipe-list" class="mb-3"></div>
        <label class="form-label">Target grams (comma-separated)</label>
        <input type="text" class="form-control" id="print-grams" value="1, 2, 5, 10">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="generatePrint()">Generate &amp; Print</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
